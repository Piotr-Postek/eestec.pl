# AWS Amplify: zmienne z konsoli są dostępne przy buildzie, ale Next.js SSR domyślnie
# ich nie widzi w Lambda. Trzeba je dopisać do .env.production przed `next build`.
# https://docs.aws.amazon.com/amplify/latest/userguide/ssr-environment-variables.html
version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - env | grep -e '^SESSION_SECRET=' -e '^ADMIN_PASSWORD=' >> .env.production
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
